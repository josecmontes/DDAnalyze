# ─── SEMOSS Integration (optional) ──────────────────────────────────────────
# Set use_semoss: true to route all LLM calls and data queries through SEMOSS
# instead of calling the Anthropic API and reading local Excel files directly.
#
# Required when use_semoss is true:
#   semoss_host      : Base URL of your SEMOSS instance, e.g. http://semoss.internal:8080
#   semoss_model_id  : ID of the Model Engine registered in SEMOSS (LLM gateway)
#
# Optional:
#   semoss_db_id     : ID of the Database Engine registered in SEMOSS.
#                      When set, the analyst code template loads data via
#                      SEMOSS SQL queries instead of reading a local Excel file.
#   semoss_access_token : Bearer token (preferred over username/password)
#   semoss_username  : SEMOSS login (used only if access_token is absent)
#   semoss_password  : SEMOSS password
#   semoss_verify_ssl: Set to false to skip TLS verification (dev only)
#   semoss_sql_query : Custom SQL to load the dataset from SEMOSS (optional;
#                      defaults to "SELECT * FROM <data_table>")
#   data_table       : Table name in SEMOSS database (used when semoss_db_id is
#                      set and no custom semoss_sql_query is provided)
#
# All values can also be supplied as environment variables:
#   SEMOSS_HOST, SEMOSS_MODEL_ID, SEMOSS_DB_ID, SEMOSS_ACCESS_TOKEN,
#   SEMOSS_USERNAME, SEMOSS_PASSWORD
#
use_semoss: false
# semoss_host: http://semoss.internal:8080
# semoss_model_id: <model-engine-id>
# semoss_db_id: <database-engine-id>
# semoss_access_token: <bearer-token>
# semoss_username: <username>
# semoss_password: <password>
# semoss_verify_ssl: true
# semoss_sql_query: "SELECT * FROM ventas"
# data_table: ventas

# ─── Global Analysis Settings ────────────────────────────────────────────────
model: claude-sonnet-4-6
active_context_file: docs/active_context.md
archive_file: docs/full_archive.txt
data_file: workspace/data.xlsx
task_file: docs/task.md
extracted_code_file: docs/extracted_code.md

graphs_folder: workspace/graphs    # analyst saves PNG charts here
workspace_script: workspace/current_analysis.py

max_tokens: 6000
analyst_max_tokens: 20000
n_iterations: 5
interval_minutes: 0
max_code_retries: 3                # retry failed code this many times
repetition_mode: soft

debug_logging: true                # true to enable DEBUG-level console output
fresh_start: false                 # true to reset active_context.md and full_archive.txt
summarize_on_start: false          # run Summarizer on active_context.md before first iteration
summarizer_every_n: 20
hybrid_threshold: 12

# ─── Web Research Module ──────────────────────────────────────────────────────
web_research_model: claude-sonnet-4-6
web_research_context_file: docs/web_research_context.md
web_research_archive_file: docs/web_research_archive.txt
web_research_iterations: 10
web_research_interval_minutes: 0
web_research_max_tokens: 6000            # Synthesizer token budget
web_research_researcher_max_tokens: 8000 # Researcher agent token budget
web_research_search_max_tokens: 16000    # Web search + synthesis token budget
web_research_summarizer_every_n: 5       # compress web research context every N iterations
web_research_fresh_start: false

# ─── Deloitte Report Module ──────────────────────────────────────────────────
deloitte_report_model: claude-sonnet-4-6
deloitte_report_planner_max_tokens: 25000   # Stage 1: blueprint JSON
deloitte_report_section_max_tokens: 25000  # Stage 2: per-section HTML + chart data
deloitte_report_summary_max_tokens: 10000   # Stage 2: executive summary
deloitte_report_glossary_max_tokens: 8000  # Stage 2: glossary
deloitte_report_final_report: docs/final_report.md
deloitte_report_output: docs/deloitte_report.html

# ─── Phase 2 / Architect Settings ────────────────────────────────────────────
phase2_architect_max_tokens: 4000
phase2_max_tokens: 50000
phase2_section_max_tokens: 8000
phase2_summary_max_tokens: 4000

# ─── Excel Export & Databook ─────────────────────────────────────────────────
databook_max_tokens: 16000              # Token budget for each per-iteration databook LLM call

# ─── Orchestrator ────────────────────────────────────────────────────────────
orchestrator_schedule:
  - iterations: 5
    type: data_analysis
  - iterations: 1
    type: web_research
  - iterations: 5
    type: data_analysis
  - iterations: 1
    type: web_research
  - iterations: 1
    type: data_analysis
  - type: report