# ─── Global Analysis Settings ────────────────────────────────────────────────
model: claude-sonnet-4-6
active_context_file: active_context.md
archive_file: full_archive.txt
data_file: workspace/data.xlsx
task_file: task.md

graphs_folder: workspace/graphs    # analyst saves PNG charts here
workspace_script: workspace/current_analysis.py

max_tokens: 6000
analyst_max_tokens: 20000
n_iterations: 5
interval_minutes: 0
max_code_retries: 3                # retry failed code this many times
repetition_mode: soft

debug_logging: true                # true to enable DEBUG-level console output
fresh_start: false                 # true to reset active_context.md and full_archive.txt
summarize_on_start: false          # run Summarizer on active_context.md before first iteration
summarizer_every_n: 20
hybrid_threshold: 12

# ─── Web Research Module ──────────────────────────────────────────────────────
web_research_model: claude-sonnet-4-6
web_research_context_file: web_research_context.md
web_research_archive_file: web_research_archive.txt
web_research_iterations: 10
web_research_interval_minutes: 0
web_research_max_tokens: 6000            # Synthesizer token budget
web_research_researcher_max_tokens: 8000 # Researcher agent token budget
web_research_search_max_tokens: 16000    # Web search + synthesis token budget
web_research_summarizer_every_n: 5       # compress web research context every N iterations
web_research_fresh_start: false

# ─── Deloitte Report Module ──────────────────────────────────────────────────
deloitte_report_model: claude-sonnet-4-6
deloitte_report_planner_max_tokens: 15000   # Stage 1: blueprint JSON
deloitte_report_section_max_tokens: 10000  # Stage 2: per-section HTML + chart data
deloitte_report_summary_max_tokens: 4000   # Stage 2: executive summary
deloitte_report_glossary_max_tokens: 3000  # Stage 2: glossary
deloitte_report_final_report: final_report.md
deloitte_report_output: deloitte_report.html

# ─── Phase 2 / Architect Settings ────────────────────────────────────────────
phase2_architect_max_tokens: 4000
phase2_max_tokens: 50000
phase2_section_max_tokens: 8000
phase2_summary_max_tokens: 4000

# ─── Orchestrator ────────────────────────────────────────────────────────────
orchestrator_schedule:
  - iterations: 5
    type: data_analysis
  - iterations: 1
    type: web_research
  - iterations: 5
    type: data_analysis
  - iterations: 1
    type: web_research
  - iterations: 1
    type: data_analysis
  - type: report